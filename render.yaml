services:
  - type: web
    name: david
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: david-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ADMIN_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEYS
        sync: false
